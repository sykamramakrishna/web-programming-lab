<!DOCTYPE html>
<html>
<head>
<title>Overlapping Image Gallery</title>

<style>

/* Container for images */
.gallery{
position: relative;
width: 500px;
height: 300px;
}

/* Overlapping images */
.gallery img{
position: absolute;
width: 150px;
height: 150px;
cursor: pointer;
border: 2px solid black;
}

/* Different positions for overlap */

.img1{
top:20px;
left:20px;
}

.img2{
top:60px;
left:120px;
}

.img3{
top:100px;
left:220px;
}

</style>

<script>

// Global variable to track highest z-index
var topIndex = 1;

// Function to bring image to front
function bringToFront(img)
{
img.style.zIndex = ++topIndex;
}

</script>

</head>

<body>

<h2>Overlapping Image Gallery</h2>

<div class="gallery">

<img src="https://picsum.photos/200?1" class="img1"
onclick="bringToFront(this)">

<img src="https://picsum.photos/200?2" class="img2"
onclick="bringToFront(this)">

<img src="https://picsum.photos/200?3" class="img3"
onclick="bringToFront(this)">

</div>

<br><br>

<p>
Name: Rama Krishna<br>

</p>

</body>
</html>
