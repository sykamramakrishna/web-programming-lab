<!DOCTYPE html>
<html>
<head>
<title>Login Window</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-color:#f2f2f2;
font-family:Arial;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px gray;
width:300px;
text-align:center;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background-color:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background-color:#45a049;
}

.info{
margin-top:15px;
font-size:14px;
color:black;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<form>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="info">
Name: Rama Krishna<br>
Reg.No: 24BDS0165
</div>

</div>

</body>
</html>
