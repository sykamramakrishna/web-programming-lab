<!DOCTYPE html>
<html>
<head>
<title>Student Registration Portal</title>

<style>

body{
background-color:skyblue;
font-family:Arial;
margin:0;
padding:0;
}

h1{
text-align:center;
margin-top:20px;
}

nav{
text-align:center;
margin:20px;
}

nav a{
background-color:darkblue;
color:white;
padding:10px 15px;
margin:5px;
text-decoration:none;
border-radius:8px;
display:inline-block;
}

.section{
background-color:darkblue;
color:white;
padding:20px;
margin:20px;
border-radius:10px;
}

input, select{
width:100%;
padding:8px;
margin:5px 0 15px 0;
border-radius:5px;
border:none;
}

button{
padding:10px 20px;
background-color:white;
color:darkblue;
font-weight:bold;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background-color:lightgray;
}

.footer{
text-align:center;
margin:20px;
font-weight:bold;
}

</style>

<script>
function showMessage(){
alert("Form Submitted Successfully");
}
</script>

</head>

<body>

<h1>Student Registration Portal</h1>

<nav>
<a href="#personal">Personal Information</a>
<a href="#academic">Academic Details</a>
<a href="#address">Address Information</a>
<a href="#account">Account Credentials</a>
</nav>

<form onsubmit="showMessage()">

<div id="personal" class="section">

<h2>Section 1: Personal Information</h2>

<label>Full Name</label>
<input type="text">

<label>Date of Birth</label>
<input type="date">

<label>Gender</label>
<select>
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Email Address</label>
<input type="email">

<label>Mobile Number</label>
<input type="text">

</div>


<div id="academic" class="section">

<h2>Section 2: Academic Details</h2>

<label>Register Number</label>
<input type="text">

<label>Degree Program</label>
<input type="text">

<label>Department</label>
<input type="text">

<label>Year of Study</label>
<input type="text">

</div>


<div id="address" class="section">

<h2>Section 3: Address Information</h2>

<label>Door Number</label>
<input type="text">

<label>Street Name</label>
<input type="text">

<label>City</label>
<input type="text">

<label>State</label>
<input type="text">

<label>Pincode</label>
<input type="text">

</div>


<div id="account" class="section">

<h2>Section 4: Account Credentials</h2>

<label>Username</label>
<input type="text">

<label>Password</label>
<input type="password">

<label>Confirm Password</label>
<input type="password">

<button type="submit">Submit</button>

</div>

</form>

<div class="footer">
Name: Rama Krishna <br>
Reg.No: 24BDS0165
</div>

</body>
</html>
